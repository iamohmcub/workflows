name: AI Workflow Validate

on:
  push:
    branches:
      - main
    paths:
      - AGENTS.md
      - README.md
      - COMMANDS.md
      - package.json
      - scripts/**
      - .ai/**
      - .github/workflows/ai-workflow.yml
  pull_request:
    branches:
      - main
    paths:
      - AGENTS.md
      - README.md
      - COMMANDS.md
      - package.json
      - scripts/**
      - .ai/**
      - .github/workflows/ai-workflow.yml
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate AI workflow
        run: node scripts/ai-workflow.mjs validate

      - name: Check agent commit identity
        run: node scripts/ai-workflow.mjs commit-check
