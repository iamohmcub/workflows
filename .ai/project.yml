version: 1
project:
  repo_group:
    id: default-workspace
    name: Default Repo Group
    description: Replace with the real workspace, organization, or group name.

  repo:
    id: workflows
    name: Workflows
    type: orchestration-template
    description: AI engineering workflow orchestration scaffold.
    parent_repo: null
    child_repos: []

  lifecycle:
    current_phase: okr
    default_start_phase: okr
    phase_source: .ai/global/sdlc.phases.yml
    require_phase_log: true
    require_handoff_note: true
    require_impact_report: true

  workspace:
    shared_config: .ai/workspace/workspace.yml
    profile: web-saas
    stack_profile: web-saas
    role_overlay_pattern: .ai/role/<role-id>/workspace.yml
    inheritance:
      company_rules: cannot_override
      role_core: cannot_override
      workspace_overlay: can_add_or_specialize

  roles:
    orchestrator: orchestrator
    active:
      - orchestrator
      - product-manager
      - product-owner
      - ux-designer
      - tech-lead
      - frontend-engineer
      - backend-engineer
      - qa-sdet
      - devops-platform
      - security-engineer
      - data-analyst
      - legal-compliance
      - process-auditor

  environments:
    enabled:
      - DEV
      - STAGING
      - UAT
      - PROD
    flow: DEV -> STAGING -> UAT -> PROD

  evidence:
    logs: .ai/runtime/logs
    reports: .ai/runtime/reports
    decisions: .ai/runtime/decisions
    handoffs: .ai/runtime/handoffs

  startup:
    worker_prompt_template: .ai/templates/worker-startup-prompt.md
    must_read:
      - AGENTS.md
      - .ai/manifest.yml
      - .ai/SKILLS.md
      - .ai/AUTOMATION.md
      - .ai/project.yml
      - .ai/workspace/workspace.yml
