version: 1
project:
  repo_group:
    id: default-workspace
    name: Default Repo Group
    description: Replace with the real workspace, organization, or group name.

  repo:
    id: workflows
    name: Workflows
    type: orchestration-template
    description: AI engineering workflow orchestration scaffold.
    parent_repo: null
    child_repos: []

  lifecycle:
    current_phase: okr
    default_start_phase: okr
    phase_source: .ai/global/sdlc.phases.yml
    require_phase_log: true
    require_handoff_note: true
    require_impact_report: true

  roles:
    orchestrator: orchestrator
    active:
      - orchestrator
      - product-manager
      - product-owner
      - ux-designer
      - tech-lead
      - frontend-engineer
      - backend-engineer
      - qa-sdet
      - devops-platform
      - security-engineer
      - data-analyst
      - legal-compliance

  environments:
    enabled:
      - DEV
      - STAGING
      - UAT
      - PROD
    optional:
      - DEMO
    flow: DEV -> STAGING -> UAT -> PROD

  evidence:
    logs: .ai/runtime/logs
    reports: .ai/runtime/reports
    decisions: .ai/runtime/decisions

  startup:
    worker_prompt_template: .ai/templates/worker-startup-prompt.md
    must_read:
      - AGENTS.md
      - .ai/manifest.yml
      - .ai/SKILLS.md
      - .ai/project.yml
