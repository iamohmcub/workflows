version: 1
workspace:
  id: default-workspace
  name: Default Workspace
  profile: web-saas
  description: Shared company standards for stack, code style, project structure, tools, QA, and automation.

  standards:
    stacks: .ai/workspace/stacks.yml
    code_style: .ai/workspace/code-style.yml
    project_structure: .ai/workspace/project-structure.yml
    tools: .ai/workspace/tools.yml
    qa_process: .ai/workspace/qa-process.yml

  selected_profiles:
    frontend: nextjs-typescript
    backend: node-api-typescript
    infra: netlify-or-container
    qa: playwright-vitest

  inheritance:
    global_company_rules: cannot_override
    role_core_rules: cannot_override
    workspace_rules: can_add_or_specialize
    repo_rules: can_add_when_stricter
    conflict_owner: orchestrator

  required_on_init:
    - workspace.id
    - workspace.name
    - workspace.profile
    - project.repo.id
    - project.repo.name
    - project.lifecycle.current_phase

  init_prompts:
    - What product or domain does this repo own?
    - Which workspace profile applies?
    - Which frontend, backend, infra, and QA profiles apply?
    - Which standards are mandatory for this company?
