version: 1
name: ai-engineering-orchestration
entrypoint: AGENTS.md
description: >
  Repo group, repo, and role orchestration for domain-expert AI teams that run
  a complete software development lifecycle with logs, gates, and impact reports.

hierarchy:
  repo_group:
    meaning: Workspace or group containing many companies, products, services, or repos.
    contains:
      - repos
      - shared standards
      - cross-repo impact reports
  repo:
    meaning: Company, product, service, or domain unit that runs SDLC phases.
    contains:
      - roles
      - repo-specific decisions
      - phase logs
      - optional child_repos
  role:
    meaning: Domain expert agent responsible for a specific part of the SDLC.
    contains:
      - character
      - skills
      - responsibilities
      - hooks
      - rules
      - workspace overlay

load_order:
  - .ai/SKILLS.md
  - .ai/AUTOMATION.md
  - .ai/project.yml
  - .ai/global/company.skills.yml
  - .ai/global/company.hooks.yml
  - .ai/global/company.rules.yml
  - .ai/global/agent.positions.yml
  - .ai/global/worker.contract.yml
  - .ai/global/event.contract.yml
  - .ai/global/routing.matrix.yml
  - .ai/global/parallel.delivery.yml
  - .ai/global/sdlc.phases.yml
  - .ai/workspace/workspace.yml
  - .ai/workspace/stacks.yml
  - .ai/workspace/code-style.yml
  - .ai/workspace/project-structure.yml
  - .ai/workspace/tools.yml
  - .ai/workspace/qa-process.yml
  - .ai/repo-group/workspace.yml
  - .ai/repo-group/impact-policy.yml
  - .ai/repo-group/repo.template.yml
  - .ai/role/orchestrator/
  - .ai/role/product-manager/
  - .ai/role/product-owner/
  - .ai/role/ux-designer/
  - .ai/role/tech-lead/
  - .ai/role/frontend-engineer/
  - .ai/role/backend-engineer/
  - .ai/role/qa-sdet/
  - .ai/role/devops-platform/
  - .ai/role/security-engineer/
  - .ai/role/data-analyst/
  - .ai/role/legal-compliance/
  - .ai/role/process-auditor/

role_module_load_order:
  - role.yml
  - interface.yml
  - playbook.md
  - checklist.md
  - workspace.yml

workspace_load_order:
  - .ai/workspace/workspace.yml
  - .ai/workspace/stacks.yml
  - .ai/workspace/code-style.yml
  - .ai/workspace/project-structure.yml
  - .ai/workspace/tools.yml
  - .ai/workspace/qa-process.yml

runtime:
  state: .ai/runtime/state.yml
  event_queue: .ai/runtime/queue
  event_history: .ai/runtime/events
  phase_logs: .ai/runtime/logs
  impact_reports: .ai/runtime/reports
  decisions: .ai/runtime/decisions
  handoffs: .ai/runtime/handoffs
  templates: .ai/templates

hard_requirements:
  - Every phase must end with a phase log.
  - Every handoff must include done, not done, risks, evidence, and DoD status.
  - Every cross-role or cross-repo impact must be reported before the next gate.
  - The orchestrator is the only role that can resolve unresolved role conflicts.
  - New projects must configure `.ai/project.yml` before AI workers begin delivery work.
  - New projects must configure `.ai/workspace/workspace.yml` before stack, style, tool, or QA decisions are made.
  - Every agent position can commit when its assigned task is done, using the agent commit format in `.ai/global/agent.positions.yml`.
  - Parallel delivery is allowed by MVP or work item when handoff evidence and locked contracts are recorded in `.ai/global/parallel.delivery.yml`.
  - AI workers must stay provider-neutral and follow `.ai/global/worker.contract.yml`.
  - Events must use `.ai/global/event.contract.yml` so humans, Codex, other hosted AI, or local LLM runners can understand the same workflow.
