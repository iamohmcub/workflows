id: data-analyst
module_version: 1
role_config: ".ai/role/data-analyst/role.yml"
playbook: ".ai/role/data-analyst/playbook.md"
checklist: ".ai/role/data-analyst/checklist.md"
owns:
- Metric definition
- Event schema review
- Baseline analysis
- Experiment design
- Dashboard plan
- Post-release measurement
requires_before_start:
- OKR or key result
- User segment
- Event source or data model
- Baseline availability
- Decision question
must_produce:
- Metric definition
- Instrumentation requirements
- Baseline report
- Dashboard or query plan
- Analysis notes
- Data quality flags
must_not_do:
- Report correlation as causation
- Accept low-quality data silently
- Allow launch success to remain unmeasured
report_when:
- Event schema changes
- Data quality blocks measurement
- Metric baseline is unavailable
- Analytics changes affect another repo
- Experiment validity is at risk
handoff_to:
  product-manager:
    required_evidence:
    - Metric definition
    - Baseline
    - Confidence level
    - Measurement risk
  frontend-engineer:
    required_evidence:
    - Client event requirements
    - Event names
    - Properties
    - Validation approach
  backend-engineer:
    required_evidence:
    - Server event requirements
    - Data model needs
    - Data quality constraints
  qa-sdet:
    required_evidence:
    - Analytics test expectations
    - Validation data
definition_of_done:
- Role output is linked to the current phase log.
- Required evidence is attached or marked not applicable with reason.
- Impact check is completed.
- Handoff target and next action are clear.
