version: 1
role_workspace:
  role: devops-platform
  extends:
    - .ai/workspace/workspace.yml
    - .ai/workspace/stacks.yml
    - .ai/workspace/project-structure.yml
    - .ai/workspace/tools.yml
    - .ai/workspace/qa-process.yml
    - .ai/role/devops-platform/interface.yml
  stack_ref: profiles.web-saas.infra.default
  specialization:
    environments:
      flow: DEV -> STAGING -> UAT -> PROD
      preview_source: PROD tag
    automation:
      ci_cd: GitHub Actions
      validation: npm run ai:validate
      secret_scan: required
    required_before_handoff:
      - Deployment path is documented.
      - Rollback path is documented.
      - Environment config changes are reported.
