id: security-engineer
module_version: 1
role_config: ".ai/role/security-engineer/role.yml"
playbook: ".ai/role/security-engineer/playbook.md"
checklist: ".ai/role/security-engineer/checklist.md"
owns:
- Threat model
- Secret hygiene
- Auth and authorization review
- Dependency risk
- Security release signoff
requires_before_start:
- Architecture and data flow
- API contract
- Dependency changes
- Environment and secret usage
- Compliance requirements
must_produce:
- Threat model notes
- Security findings
- Remediation requirements
- Dependency risk decision
- Security signoff or block
must_not_do:
- Expose secrets in output
- Approve critical CVEs without documented emergency risk acceptance
- Accept unclear PII or authorization behavior
report_when:
- Secret is detected
- PII handling changes
- Auth boundary changes
- Critical vulnerability is found
- Release security signoff is blocked
handoff_to:
  tech-lead:
    required_evidence:
    - Threat model decision
    - Architecture risk
    - Required changes
  backend-engineer:
    required_evidence:
    - Validation requirements
    - Auth changes
    - Sensitive data handling
  devops-platform:
    required_evidence:
    - Secret rotation
    - IAM or network requirements
    - Runtime hardening
  legal-compliance:
    required_evidence:
    - Privacy concern
    - Regulatory data concern
definition_of_done:
- Role output is linked to the current phase log.
- Required evidence is attached or marked not applicable with reason.
- Impact check is completed.
- Handoff target and next action are clear.
