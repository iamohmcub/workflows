version: 1
scope: company
applies_to: all_repo_groups_repos_and_roles

collaboration:
  COLLAB-001: No role overrides another role silently. Use conflict log and orchestrator decision.
  COLLAB-002: Handoff note is required before work moves downstream.
  COLLAB-003: Single source of truth lives in `.ai` for governance and in the repo for implementation artifacts.
  COLLAB-004: Cross-role and cross-repo impacts require reports before the next gate.

organization:
  ORG-001: Complete each phase DoD before the next phase starts.
  ORG-002: Code flows DEV -> STAGING -> UAT -> PROD. Never reverse.
  ORG-003: Do not skip environments except through documented emergency policy.
  ORG-004: Every artifact must trace to OKR, AC, ticket, incident, or user request.
  ORG-005: Parallel work is allowed by MVP or work item after a clear handoff unlocks the next lane.
  ORG-006: A blocked gate for one work item does not block unrelated work items unless shared contracts, environments, customers, security, compliance, or repo-group dependencies are affected.
  ORG-007: Changing locked scope, acceptance criteria, design, API, data, or release contracts after handoff requires an impact report.

quality:
  QUAL-001: DoD is a gate, not a guideline.
  QUAL-002: Tests are written before or with the code, not after as cleanup.
  QUAL-003: CI must pass for every code path, including P0.
  QUAL-004: Peer review is required. No self-approval.
  QUAL-005: Every fixed bug adds a permanent regression test.

security:
  SEC-001: Zero secrets in output. Secret detection is a hard block.
  SEC-002: Validate all input at trust boundaries.
  SEC-003: Security review is required for every production release.
  SEC-004: Critical dependency vulnerabilities block release.

communication:
  COMM-001: No silent failures. Report blockers immediately.
  COMM-002: Write decisions where future roles can find them.
  COMM-003: Use plain language for status, risk, and tradeoff reports.

source_control:
  COMMIT-001: "Every agent position can commit when its assigned task is done."
  COMMIT-002: "Commit subject must start with the agent callsign, for example `Agent Berners: implement checkout form`."
  COMMIT-003: "Commit body must include AI-Agent-Name, AI-Agent, AI-Role, AI-Phase, AI-Feature, AI-Task-Done, and AI-Evidence trailers."
  COMMIT-004: "Keep the real Git author account. Put agent callsign and stable id in commit metadata."
  COMMIT-005: "Do not commit unfinished work as done. If work is partial, write a handoff or impact report instead."
  COMMIT-006: "Every done commit must name the feature, capability, bug, incident, or workflow area in AI-Feature."
  BRANCH-001: "Use a dedicated branch for parallel feature, fix, hotfix, chore, docs, test, refactor, or workflow work."
  BRANCH-002: "Branch names should include the feature or work item when known."
  PRMR-001: "Open a PR/MR before merge and link phase log, evidence, tests, impact reports, and handoffs when relevant."
  PRMR-002: "No self-approval. Required reviewers must match ownership and impact."
  PRMR-003: "Do not merge until CI, tests, lint, secret scan, review, and required impact acknowledgements are complete."
  MERGE-001: "Merge conflicts must be routed to file and domain owners, resolved with evidence, and retested."
  MERGE-002: "If conflict resolution changes API, data, UI state, infra, security, release, or customer expectations, update or create an impact report."

incident:
  INC-001: P0 and P1 incidents require post-mortems within 24 hours.
  INC-002: Same production bug twice is a process failure.
  INC-003: Feature flag mitigation is checked before rollback or hotfix.
