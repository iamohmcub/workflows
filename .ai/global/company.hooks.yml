version: 1
scope: company
applies_to: all_repo_groups_repos_and_roles

hooks:
  on_project_init:
    trigger: New repo group, repo, or project is created.
    actions:
      - Load manifest and global rules.
      - Register repo group, repo, and roles.
      - Create runtime folders for logs, reports, and decisions.

  on_phase_start:
    trigger: A new SDLC phase begins.
    actions:
      - Verify previous phase DoD is complete.
      - Assign owner role and supporting roles.
      - Create phase log from template.

  on_parallel_lane_start:
    trigger: A role starts a phase for a specific MVP, slice, or work item while another lane continues.
    actions:
      - Confirm work item id, lane, phase, owner role, and upstream handoff.
      - Create a lane-specific phase log.
      - Do not change repo current phase unless orchestrator explicitly sets it.
      - Link dependencies and locked contracts.

  on_handoff_accepted:
    trigger: A downstream owner accepts a completed handoff for a work item.
    actions:
      - Mark the downstream lane as unlocked.
      - Allow upstream business, product, or design roles to continue next phase or next MVP.
      - Require impact report for any later change to locked handoff contracts.

  on_artifact_created:
    trigger: Any artifact, design, code, test, report, or release note is produced.
    actions:
      - Check traceability to OKR, AC, ticket, incident, or request.
      - Scan for secrets and PII.
      - Add artifact link to the phase log.

  on_agent_task_done:
    trigger: An agent position completes its assigned task.
    actions:
      - Confirm phase log and evidence are updated.
      - Confirm impact report and handoff note exist when required.
      - Commit with `<agent-callsign>: <completed task summary>`.
      - Include AI-Agent-Name, AI-Agent, AI-Role, AI-Phase, AI-Feature, AI-Task-Done, and AI-Evidence trailers.

  on_branch_created:
    trigger: A feature, fix, hotfix, chore, docs, test, refactor, or workflow branch is created.
    actions:
      - Confirm base branch, feature or work item, owner role, and lane.
      - Link branch name in the phase log when work starts.
      - Keep branch metadata aligned with commit trailers.

  on_change_request_opened:
    trigger: A pull request or merge request is opened.
    actions:
      - Link phase log, tests, impact reports, handoffs, and decisions.
      - Route reviewers with the routing matrix.
      - Mark draft PR/MR as not mergeable until evidence is complete.

  on_change_request_reviewed:
    trigger: A reviewer approves, comments, requests changes, or blocks a PR/MR.
    actions:
      - Record reviewer role and decision.
      - Return requested changes to the owner with itemized feedback.
      - Block approval when required evidence, checks, or impact acknowledgement is missing.

  on_change_request_merged:
    trigger: A PR/MR is merged.
    actions:
      - Confirm approvals, CI, tests, secret scan, and impact acknowledgements.
      - Update phase log with PR/MR link and merge result.
      - Start downstream handoff when merge unlocks another role or lane.

  on_merge_conflict_detected:
    trigger: A branch, PR, MR, rebase, or merge has conflicts.
    actions:
      - Identify changed files, file owners, domain owners, branch owners, and impacted contracts.
      - Route domain decisions to the owning role and unresolved process conflict to orchestrator.
      - Record conflict decision and rerun impacted tests.
      - Create or update impact report when contract behavior changes.

  on_artifact_rejected:
    trigger: Artifact fails DoD or reviewer acceptance.
    actions:
      - Return artifact to owner with itemized feedback.
      - Log rejection reason.
      - Escalate after three rejections.

  on_impact_detected:
    trigger: Work affects another role, repo, customer, environment, API, data contract, security boundary, or SLA.
    actions:
      - Create impact report.
      - Notify affected owners.
      - Block next gate until acknowledged or explicitly accepted by orchestrator.

  on_secret_detected:
    trigger: Secret appears in code, logs, prompt, output, or artifact.
    actions:
      - Hard block immediately.
      - Remove exposure.
      - Rotate secret if exposure is confirmed.
      - Record security decision.

  on_bug_detected:
    trigger: Bug is found in any phase or environment.
    actions:
      - Classify P0, P1, P2, or P3.
      - Route to standard, fast-track, or emergency workflow.
      - Require regression test for every fixed bug.

  on_p0_emergency:
    trigger: System down, data loss, security breach, or all users blocked.
    actions:
      - Pause non-critical work.
      - Try feature flag mitigation first.
      - Choose rollback or hotfix within 10 minutes.
      - Keep CI, peer review, and evidence requirements.

  on_incident_resolved:
    trigger: P0 or P1 incident is closed.
    actions:
      - Schedule post-mortem within 24 hours.
      - Record timeline, impact, root cause, and action items.
      - Add follow-up work to backlog.
