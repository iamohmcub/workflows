version: 1
scope: company

commit_policy:
  rule: Every agent position can commit when its assigned task is done.
  when_allowed:
    - Assigned task is complete.
    - Phase log is created or updated.
    - Evidence is linked.
    - Required impact reports are created.
    - Required handoff note is created before downstream work starts.
  subject_format: "<agent-callsign>: <completed task summary>"
  required_trailers:
    - AI-Agent-Name
    - AI-Agent
    - AI-Role
    - AI-Phase
    - AI-Task-Done
    - AI-Evidence
  optional_parallel_trailers:
    - AI-Work-Item
    - AI-Lane
  task_done_value: "yes"
  author_rule: Keep the real Git author account. Put agent callsign and stable id in the commit subject and trailers.

