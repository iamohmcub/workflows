version: 1
scope: company

principle: >
  Phase ownership is not the same as task responsibility. Use this matrix to
  decide who owns, contributes, reviews, and must be notified for each phase,
  lane, and impact type.

raci_terms:
  responsible: Does the work.
  accountable: Owns final phase or gate outcome.
  consulted: Must be asked before irreversible decisions.
  informed: Must be told when the work affects their area.

phase_routing:
  okr:
    accountable: product-manager
    responsible:
      - product-manager
      - data-analyst
    consulted:
      - product-owner
      - ux-designer
    informed:
      - orchestrator

  user-research:
    accountable: ux-designer
    responsible:
      - ux-designer
      - data-analyst
    consulted:
      - product-manager
      - product-owner
    informed:
      - orchestrator

  prd:
    accountable: product-manager
    responsible:
      - product-manager
      - product-owner
    consulted:
      - ux-designer
      - tech-lead
      - data-analyst
    informed:
      - orchestrator

  ux-design:
    accountable: ux-designer
    responsible:
      - ux-designer
    consulted:
      - product-owner
      - frontend-engineer
      - qa-sdet
    informed:
      - product-manager
      - orchestrator

  technical-design:
    accountable: tech-lead
    responsible:
      - tech-lead
      - frontend-engineer
      - backend-engineer
      - devops-platform
    consulted:
      - security-engineer
      - qa-sdet
      - data-analyst
    informed:
      - product-manager
      - orchestrator

  development:
    accountable: tech-lead
    responsible:
      - frontend-engineer
      - backend-engineer
      - devops-platform
    consulted:
      - qa-sdet
      - security-engineer
    informed:
      - product-owner
      - orchestrator

  qa-testing:
