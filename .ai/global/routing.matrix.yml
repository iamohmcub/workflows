      - frontend-engineer
      - backend-engineer
    consulted:
      - tech-lead
      - security-engineer
    informed:
      - product-owner
      - devops-platform
      - orchestrator

  release-deployment:
    accountable: devops-platform
    responsible:
      - devops-platform
      - qa-sdet
    consulted:
      - tech-lead
      - security-engineer
      - legal-compliance
    informed:
      - product-manager
      - product-owner
      - orchestrator

  monitoring:
    accountable: devops-platform
    responsible:
      - devops-platform
      - data-analyst
    consulted:
      - backend-engineer
      - frontend-engineer
    informed:
      - product-manager
