    consulted:
      - product-owner
      - ux-designer
      - tech-lead
    informed:
      - orchestrator

impact_routing:
  api_contract:
    consulted:
      - backend-engineer
      - frontend-engineer
      - qa-sdet
    informed:
      - tech-lead
      - product-owner

  data_contract:
    consulted:
      - backend-engineer
      - data-analyst
      - qa-sdet
    informed:
      - tech-lead
      - product-manager

  design_system:
    consulted:
      - ux-designer
      - frontend-engineer
      - qa-sdet
    informed:
      - product-owner

  infrastructure:
    consulted:
      - devops-platform
      - security-engineer
      - backend-engineer
    informed:
      - tech-lead
      - qa-sdet

  security_boundary:
    consulted:
      - security-engineer
      - tech-lead
      - devops-platform
    informed:
      - product-manager
      - legal-compliance
      - qa-sdet

  legal_or_compliance:
    consulted:
      - legal-compliance
      - security-engineer
      - product-manager
    informed:
      - orchestrator

  customer_commitment:
    consulted:
      - product-manager
      - product-owner
      - qa-sdet
    informed:
      - orchestrator

rules:
  - If a role is responsible, it may commit done work for its own task.
  - If a role is consulted, it must acknowledge material changes before the next gate.
  - If a role is informed, the phase log or impact report must link the notification.
  - The orchestrator resolves conflicts when accountable and consulted roles disagree.
